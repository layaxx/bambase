services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: bambase_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-strapi}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    restart: unless-stopped
    container_name: bambase_api
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SEED: ${SEED:-false}
      DATABASE_CLIENT: "postgres"
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
    volumes:
      - api_uploads:/opt/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy
      - internal_network

  frontend:
    build:
      context: ./frontend
    container_name: bambase_frontend
    environment:
      STRAPI_URL: http://api:1337
      STRAPI_TOKEN: ${STRAPI_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - proxy
      - internal_network

volumes:
  db_data:
  api_uploads:

networks:
  internal_network:
    name: internal_network
  proxy:
    name: proxy
    external: true
