name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Create date tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create date-based tag
        run: |
          DATE=$(date -u +"%Y.%m.%d")
          BASE_TAG="v${DATE}"

          git fetch --tags

          TAG="$BASE_TAG"
          N=1
          while git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; do
            TAG="${BASE_TAG}.${N}"
            N=$((N + 1))
          done

          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"
