name: CI

on:
  pull_request:

jobs:
  lint-api:
    name: Lint (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: api
      - run: yarn lint && yarn format:check
        working-directory: api

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: frontend
      - run: yarn lint && yarn format:check
        working-directory: frontend

  test-api:
    name: Unit tests (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: api
      - run: yarn test
        working-directory: api

  test-frontend:
    name: Unit tests (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: frontend
      - run: yarn test
        working-directory: frontend

  docker-build-api:
    name: Docker build (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: STRAPI_URL=http://api:1337
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Create proxy network
        run: docker network create proxy

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
        env:
          SEED: "true"
          APP_KEYS: ${{ secrets.APP_KEYS }}
          API_TOKEN_SALT: ${{ secrets.API_TOKEN_SALT }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          TRANSFER_TOKEN_SALT: ${{ secrets.TRANSFER_TOKEN_SALT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
          MAILGUN_API_KEY: ""
          MAILGUN_DOMAIN: ""
          FRONTEND_URL: "http://localhost:4321"
          JOB_OFFER_MIGRATION_COOKIE: ""

      - name: Wait for stack to be healthy
        run: |
          timeout 180 bash -c 'until curl -sf http://localhost:1337/_healthcheck; do sleep 3; done'
          timeout 60 bash -c 'until curl -sf http://localhost:4321; do sleep 3; done'

      - name: Run E2E tests
        run: yarn test:e2e
        working-directory: frontend
        env:
          CI: "true"
          STRAPI_URL: "http://localhost:1337"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
